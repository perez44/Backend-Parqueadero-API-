<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parking Lot - Iniciar Sesion</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2"/>
                    <path d="M9 17V7h4a3 3 0 0 1 0 6H9"/>
                </svg>
                <h1>Parking Lot</h1>
                <p>Sistema de Gestion de Parqueadero</p>
            </div>

            <div id="alertContainer"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">Tipo de acceso</label>
                    <select id="loginType" class="form-control" onchange="togglePasswordField()">
                        <option value="admin">Administrador / Operador</option>
                        <option value="user">Usuario</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Numero de Documento</label>
                    <input type="text" id="documentNumber" class="form-control" placeholder="Ingrese su numero de documento" required>
                </div>

                <div class="form-group" id="passwordGroup">
                    <label class="form-label">Contrasena</label>
                    <input type="password" id="password" class="form-control" placeholder="Ingrese su contrasena">
                </div>

                <button type="submit" class="btn btn-primary btn-lg" style="width: 100%; margin-top: 1rem;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                        <polyline points="10 17 15 12 10 7"/>
                        <line x1="15" y1="12" x2="3" y2="12"/>
                    </svg>
                    Iniciar Sesion
                </button>
            </form>

            <div style="text-align: center; margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border-color);">
                <p style="font-size: 0.75rem; color: var(--text-muted);">
                    Credenciales de prueba:<br>
                    Admin: 123456789 / admin123<br>
                    Operador: 987654321 / oper123<br>
                    Usuario: 111222333
                </p>
            </div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script>
        function togglePasswordField() {
            const loginType = document.getElementById('loginType').value;
            const passwordGroup = document.getElementById('passwordGroup');
            const passwordInput = document.getElementById('password');
            
            if (loginType === 'user') {
                passwordGroup.style.display = 'none';
                passwordInput.removeAttribute('required');
            } else {
                passwordGroup.style.display = 'block';
                passwordInput.setAttribute('required', 'required');
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const loginType = document.getElementById('loginType').value;
            const documentNumber = document.getElementById('documentNumber').value;
            const password = document.getElementById('password').value;
            
            // Try API login first
            try {
                const API_BASE_URL = 'http://localhost:3000/api';
                const response = await fetch(`${API_BASE_URL}/usuarios/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        correo: documentNumber, // The API might use correo or documento
                        contrasena: password,
                        documento: documentNumber
                    })
                });
                
                const data = await response.json();
                
                if (response.ok && data) {
                    // Save session with API data
                    const userData = data.data || data.usuario || data;
                    const session = {
                        userId: userData.id_usuario || userData.id,
                        documentNumber: userData.documento || documentNumber,
                        fullName: userData.nombre || 'Usuario',
                        email: userData.correo,
                        phone: userData.telefono,
                        userType: userData.tipo_perfil || userData.perfil || (loginType === 'user' ? 'usuario' : 'administrador'),
                        loginTime: new Date().toISOString()
                    };
                    
                    localStorage.setItem('currentSession', JSON.stringify(session));
                    
                    // Redirect based on user type
                    if (session.userType === 'usuario' || session.userType === 'Cliente') {
                        window.location.href = 'pages/client-dashboard.html';
                    } else {
                        window.location.href = 'pages/dashboard.html';
                    }
                    return;
                }
            } catch (apiError) {
                console.warn('API login failed, trying local auth:', apiError);
            }
            
            // Fallback to local Auth
            const result = Auth.login(documentNumber, password, loginType);
            
            if (result.success) {
                // Redirect based on user type
                if (result.user && result.user.userType === 'usuario') {
                    window.location.href = 'pages/client-dashboard.html';
                } else {
                    window.location.href = 'pages/dashboard.html';
                }
            } else {
                showAlert(result.message, 'danger');
            }
        });

        function showAlert(message, type) {
            const alertContainer = document.getElementById('alertContainer');
            alertContainer.innerHTML = `
                <div class="alert alert-${type}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        ${type === 'danger' ? 
                            '<circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>' :
                            '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>'}
                    </svg>
                    <span>${message}</span>
                </div>
            `;
            
            setTimeout(() => {
                alertContainer.innerHTML = '';
            }, 5000);
        }

        // Check if already logged in
        if (Auth.isLoggedIn()) {
            window.location.href = 'pages/dashboard.html';
        }
    </script>
</body>
</html>
