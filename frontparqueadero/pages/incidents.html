<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incidencias - Parking Lot</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="app-container">
        <div id="sidebar"></div>
        
        <main class="main-content">
            <div class="page-header">
                <div class="page-title">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                        <line x1="12" y1="9" x2="12" y2="13"/>
                        <line x1="12" y1="17" x2="12.01" y2="17"/>
                    </svg>
                    <div>
                        <h1>Registro de Incidencias</h1>
                        <p class="page-subtitle">Gestionar incidencias ocurridas en el parqueadero</p>
                    </div>
                </div>
                <button class="btn btn-danger" onclick="openCreateModal()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"/>
                        <line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                    Registrar Incidencia
                </button>
            </div>

            <div id="alertContainer"></div>

            <!-- Stats -->
            <div class="stats-grid" style="margin-bottom: 2rem;">
                <div class="stat-card">
                    <div class="stat-icon red">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                        </svg>
                    </div>
                    <div class="stat-info">
                        <h3>Total Incidencias</h3>
                        <div class="stat-value" id="statTotal">0</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon yellow">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 16H9m10 0h3v-3.15a1 1 0 0 0-.84-.99L16 11l-2.7-3.6a1 1 0 0 0-.8-.4H5.24a2 2 0 0 0-1.8 1.1l-.8 1.63A6 6 0 0 0 2 12.42V16h2"/>
                            <circle cx="6.5" cy="16.5" r="2.5"/>
                            <circle cx="16.5" cy="16.5" r="2.5"/>
                        </svg>
                    </div>
                    <div class="stat-info">
                        <h3>Choques</h3>
                        <div class="stat-value" id="statChoques">0</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon cyan">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                        </svg>
                    </div>
                    <div class="stat-info">
                        <h3>Rayones</h3>
                        <div class="stat-value" id="statRayones">0</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon blue">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        </svg>
                    </div>
                    <div class="stat-info">
                        <h3>Golpes contra Muros</h3>
                        <div class="stat-value" id="statGolpes">0</div>
                    </div>
                </div>
            </div>

            <!-- Filters -->
            <div class="filters">
                <div class="filter-group">
                    <label>Tipo de Incidencia</label>
                    <select id="filterType" onchange="filterIncidents()">
                        <option value="">Todos</option>
                        <option value="rayon">Rayon</option>
                        <option value="choque">Choque</option>
                        <option value="atropellamiento">Atropellamiento</option>
                        <option value="golpe_muro">Golpe contra Muro</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Fecha</label>
                    <input type="date" id="filterDate" onchange="filterIncidents()">
                </div>
                <div class="filter-group">
                    <label>Placa</label>
                    <input type="text" id="filterPlate" placeholder="Buscar placa..." oninput="filterIncidents()">
                </div>
            </div>

            <!-- Incidents Table -->
            <div class="card">
                <div class="table-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Codigo</th>
                                <th>Tipo</th>
                                <th>Vehiculo Afectado</th>
                                <th>Fecha</th>
                                <th>Hora</th>
                                <th>Descripcion</th>
                            </tr>
                        </thead>
                        <tbody id="incidentsTable">
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Create Incident Modal -->
    <div class="modal-overlay" id="incidentModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">Registrar Incidencia</h3>
                <button class="modal-close" onclick="closeModal()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <form id="incidentForm" onsubmit="saveIncident(event)">
                <div class="modal-body">
                    <div class="form-group">
                        <label class="form-label">Tipo de Incidencia *</label>
                        <select id="incidentType" class="form-control" required>
                            <option value="">Seleccionar...</option>
                            <option value="rayon">Rayon</option>
                            <option value="choque">Choque</option>
                            <option value="atropellamiento">Atropellamiento</option>
                            <option value="golpe_muro">Golpe contra Muro</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Vehiculo Afectado *</label>
                        <select id="vehicleId" class="form-control" required>
                            <option value="">Seleccionar vehiculo...</option>
                        </select>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Fecha *</label>
                            <input type="date" id="incidentDate" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Hora *</label>
                            <input type="time" id="incidentTime" class="form-control" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Descripcion</label>
                        <textarea id="description" class="form-control" rows="3" placeholder="Describa los detalles de la incidencia..."></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
                    <button type="submit" class="btn btn-danger">Registrar Incidencia</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/data.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        // Check authentication
        if (!Auth.checkAdminOrOperatorAuth()) {
            window.location.href = 'dashboard.html';
        }

        // Render sidebar
        document.getElementById('sidebar').innerHTML = renderSidebar('incidents');

        let allIncidents = [];

        // Load incidents
        function loadIncidents() {
            allIncidents = DataStore.getIncidents();
            renderIncidents(allIncidents);
            updateStats();
            loadVehicleOptions();
        }

        // Load vehicle options
        function loadVehicleOptions() {
            const vehicles = DataStore.getVehicles();
            const select = document.getElementById('vehicleId');
            
            select.innerHTML = '<option value="">Seleccionar vehiculo...</option>' +
                vehicles.map(v => `<option value="${v.id}">${v.plate} - ${v.brand} ${v.model}</option>`).join('');
        }

        // Update stats
        function updateStats() {
            document.getElementById('statTotal').textContent = allIncidents.length;
            document.getElementById('statChoques').textContent = allIncidents.filter(i => i.type === 'choque').length;
            document.getElementById('statRayones').textContent = allIncidents.filter(i => i.type === 'rayon').length;
            document.getElementById('statGolpes').textContent = allIncidents.filter(i => i.type === 'golpe_muro').length;
        }

        // Render incidents table
        function renderIncidents(incidents) {
            const tbody = document.getElementById('incidentsTable');
            
            if (incidents.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">No se han registrado incidencias</td></tr>';
                return;
            }

            const typeLabels = {
                'rayon': 'Rayon',
                'choque': 'Choque',
                'atropellamiento': 'Atropellamiento',
                'golpe_muro': 'Golpe contra Muro'
            };

            const typeBadges = {
                'rayon': 'badge-info',
                'choque': 'badge-danger',
                'atropellamiento': 'badge-warning',
                'golpe_muro': 'badge-primary'
            };

            tbody.innerHTML = incidents.slice().reverse().map(incident => {
                const vehicle = DataStore.getVehicleById(incident.vehicleId);
                const date = new Date(incident.date + 'T' + incident.time);
                return `
                <tr>
                    <td><span class="badge badge-danger">${incident.code}</span></td>
                    <td>
                        <span class="badge ${typeBadges[incident.type] || 'badge-info'}">
                            ${typeLabels[incident.type] || incident.type}
                        </span>
                    </td>
                    <td>${vehicle ? vehicle.plate : 'N/A'}</td>
                    <td>${Utils.formatDate(incident.date)}</td>
                    <td>${incident.time}</td>
                    <td>${incident.description || '<span class="text-muted">Sin descripcion</span>'}</td>
                </tr>
            `}).join('');
        }

        // Filter incidents
        function filterIncidents() {
            const type = document.getElementById('filterType').value;
            const date = document.getElementById('filterDate').value;
            const plate = document.getElementById('filterPlate').value.toUpperCase();

            let filtered = allIncidents;

            if (type) {
                filtered = filtered.filter(i => i.type === type);
            }

            if (date) {
                filtered = filtered.filter(i => i.date === date);
            }

            if (plate) {
                filtered = filtered.filter(i => {
                    const vehicle = DataStore.getVehicleById(i.vehicleId);
                    return vehicle && vehicle.plate.includes(plate);
                });
            }

            renderIncidents(filtered);
        }

        // Open create modal
        function openCreateModal() {
            document.getElementById('incidentForm').reset();
            
            // Set default date and time
            const now = new Date();
            document.getElementById('incidentDate').value = now.toISOString().split('T')[0];
            document.getElementById('incidentTime').value = now.toTimeString().slice(0, 5);
            
            Utils.openModal('incidentModal');
        }

        // Close modal
        function closeModal() {
            Utils.closeModal('incidentModal');
        }

        // Save incident
        function saveIncident(e) {
            e.preventDefault();
            
            const incidentData = {
                type: document.getElementById('incidentType').value,
                vehicleId: parseInt(document.getElementById('vehicleId').value),
                date: document.getElementById('incidentDate').value,
                time: document.getElementById('incidentTime').value,
                description: document.getElementById('description').value
            };

            DataStore.createIncident(incidentData);
            Utils.showAlert('Incidencia registrada correctamente', 'success');

            closeModal();
            loadIncidents();
        }

        // Initialize
        loadIncidents();
    </script>
</body>
</html>
