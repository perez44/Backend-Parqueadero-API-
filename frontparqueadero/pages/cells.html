<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celdas de Parqueo - Parking Lot</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="app-container">
        <div id="sidebar"></div>
        
        <main class="main-content">
            <div class="page-header">
                <div class="page-title">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        <line x1="3" y1="9" x2="21" y2="9"/>
                        <line x1="3" y1="15" x2="21" y2="15"/>
                        <line x1="9" y1="3" x2="9" y2="21"/>
                        <line x1="15" y1="3" x2="15" y2="21"/>
                    </svg>
                    <div>
                        <h1>Celdas de Parqueo</h1>
                        <p class="page-subtitle">Visualizar y gestionar celdas del parqueadero</p>
                    </div>
                </div>
            </div>

            <div id="alertContainer"></div>

            <!-- Stats -->
            <div class="stats-grid" style="margin-bottom: 2rem;">
                <div class="stat-card">
                    <div class="stat-icon blue">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        </svg>
                    </div>
                    <div class="stat-info">
                        <h3>Total Celdas</h3>
                        <div class="stat-value" id="statTotal">0</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon green">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="20 6 9 17 4 12"/>
                        </svg>
                    </div>
                    <div class="stat-info">
                        <h3>Disponibles</h3>
                        <div class="stat-value" id="statAvailable">0</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon red">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
                        </svg>
                    </div>
                    <div class="stat-info">
                        <h3>Ocupadas</h3>
                        <div class="stat-value" id="statOccupied">0</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon cyan">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="5" cy="17" r="3"/>
                            <circle cx="19" cy="17" r="3"/>
                            <path d="M9 17h6l3-8h-3l-2-4H7l-2 4"/>
                        </svg>
                    </div>
                    <div class="stat-info">
                        <h3>Celdas de Moto</h3>
                        <div class="stat-value" id="statMoto">0</div>
                    </div>
                </div>
            </div>

            <!-- Floor Selector -->
            <div class="floor-selector" id="floorSelector">
                <button class="floor-btn active" onclick="selectFloor(1)">Piso 1</button>
                <button class="floor-btn" onclick="selectFloor(2)">Piso 2</button>
                <button class="floor-btn" onclick="selectFloor(3)">Piso 3</button>
            </div>

            <!-- Legend -->
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-color available"></div>
                    <span>Disponible (Carro)</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color occupied"></div>
                    <span>Ocupado</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color moto"></div>
                    <span>Moto</span>
                </div>
            </div>

            <!-- Area Sections -->
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 1.5rem;">
                <!-- Area A -->
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">Area A</h3>
                        <span class="badge badge-info" id="areaACount">0</span>
                    </div>
                    <div class="parking-grid" id="areaAGrid"></div>
                </div>

                <!-- Area B -->
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">Area B</h3>
                        <span class="badge badge-info" id="areaBCount">0</span>
                    </div>
                    <div class="parking-grid" id="areaBGrid"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Cell Details Modal -->
    <div class="modal-overlay" id="cellModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">Detalles de Celda</h3>
                <button class="modal-close" onclick="Utils.closeModal('cellModal')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body" id="cellDetails">
            </div>
            <div class="modal-footer" id="cellActions">
            </div>
        </div>
    </div>

    <!-- Assign Vehicle Modal -->
    <div class="modal-overlay" id="assignModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">Asignar Vehiculo a Celda</h3>
                <button class="modal-close" onclick="Utils.closeModal('assignModal')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <form id="assignForm" onsubmit="assignVehicleToCell(event)">
                <div class="modal-body">
                    <input type="hidden" id="assignCellId">
                    
                    <div class="form-group">
                        <label class="form-label">Celda</label>
                        <input type="text" id="assignCellCode" class="form-control" readonly>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Vehiculo *</label>
                        <select id="assignVehicle" class="form-control" required>
                            <option value="">Seleccionar vehiculo...</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="Utils.closeModal('assignModal')">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Asignar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/data.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        // Check authentication
        Auth.checkAuth();

        // Render sidebar
        document.getElementById('sidebar').innerHTML = renderSidebar('cells');

        let currentFloor = 1;
        let allCells = [];

        // Load cells
        function loadCells() {
            allCells = DataStore.getParkingCells();
            updateStats();
            renderFloor(currentFloor);
        }

        // Update stats
        function updateStats() {
            const available = allCells.filter(c => c.status === 'disponible').length;
            const occupied = allCells.filter(c => c.status === 'ocupado').length;
            const moto = allCells.filter(c => c.type === 'moto').length;

            document.getElementById('statTotal').textContent = allCells.length;
            document.getElementById('statAvailable').textContent = available;
            document.getElementById('statOccupied').textContent = occupied;
            document.getElementById('statMoto').textContent = moto;
        }

        // Select floor
        function selectFloor(floor) {
            currentFloor = floor;
            
            // Update buttons
            document.querySelectorAll('.floor-btn').forEach((btn, index) => {
                btn.classList.toggle('active', index + 1 === floor);
            });
            
            renderFloor(floor);
        }

        // Render floor
        function renderFloor(floor) {
            const floorCells = allCells.filter(c => c.floor === floor);
            const areaACells = floorCells.filter(c => c.area === 'A');
            const areaBCells = floorCells.filter(c => c.area === 'B');

            // Update area counts
            document.getElementById('areaACount').textContent = 
                `${areaACells.filter(c => c.status === 'disponible').length}/${areaACells.length}`;
            document.getElementById('areaBCount').textContent = 
                `${areaBCells.filter(c => c.status === 'disponible').length}/${areaBCells.length}`;

            // Render grids
            document.getElementById('areaAGrid').innerHTML = renderCellsGrid(areaACells);
            document.getElementById('areaBGrid').innerHTML = renderCellsGrid(areaBCells);
        }

        // Render cells grid
        function renderCellsGrid(cells) {
            return cells.map(cell => `
                <div class="parking-cell ${cell.status === 'disponible' ? 'available' : 'occupied'} ${cell.type === 'moto' ? 'moto' : ''}" 
                     onclick="showCellDetails(${cell.id})"
                     title="${cell.code} - ${cell.status === 'disponible' ? 'Disponible' : 'Ocupado'}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        ${cell.type === 'moto' ? 
                            '<circle cx="5" cy="17" r="3"/><circle cx="19" cy="17" r="3"/><path d="M9 17h6l3-8h-3l-2-4H7l-2 4"/>' :
                            '<path d="M14 16H9m10 0h3v-3.15a1 1 0 0 0-.84-.99L16 11l-2.7-3.6a1 1 0 0 0-.8-.4H5.24a2 2 0 0 0-1.8 1.1l-.8 1.63A6 6 0 0 0 2 12.42V16h2"/><circle cx="6.5" cy="16.5" r="2.5"/><circle cx="16.5" cy="16.5" r="2.5"/>'
                        }
                    </svg>
                    <span>${cell.code}</span>
                </div>
            `).join('');
        }

        // Show cell details
        function showCellDetails(cellId) {
            const cell = DataStore.getCellById(cellId);
            if (!cell) return;

            let vehicleInfo = '';
            if (cell.vehicleId) {
                const vehicle = DataStore.getVehicleById(cell.vehicleId);
                if (vehicle) {
                    const owner = vehicle.ownerId ? DataStore.getUserById(vehicle.ownerId) : null;
                    vehicleInfo = `
                        <div style="margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border-color);">
                            <h4 style="margin-bottom: 0.75rem;">Vehiculo Asignado</h4>
                            <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.75rem;">
                                <div>
                                    <p class="text-muted" style="font-size: 0.75rem;">Placa</p>
                                    <p><span class="badge badge-primary">${vehicle.plate}</span></p>
                                </div>
                                <div>
                                    <p class="text-muted" style="font-size: 0.75rem;">Tipo</p>
                                    <p>${vehicle.type}</p>
                                </div>
                                <div>
                                    <p class="text-muted" style="font-size: 0.75rem;">Marca/Modelo</p>
                                    <p>${vehicle.brand} ${vehicle.model}</p>
                                </div>
                                <div>
                                    <p class="text-muted" style="font-size: 0.75rem;">Propietario</p>
                                    <p>${owner ? owner.fullName : 'N/A'}</p>
                                </div>
                            </div>
                        </div>
                    `;
                }
            }

            document.getElementById('cellDetails').innerHTML = `
                <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem;">
                    <div>
                        <p class="text-muted" style="font-size: 0.75rem;">Codigo</p>
                        <p style="font-size: 1.25rem; font-weight: 600;">${cell.code}</p>
                    </div>
                    <div>
                        <p class="text-muted" style="font-size: 0.75rem;">Estado</p>
                        <p>
                            <span class="badge ${cell.status === 'disponible' ? 'badge-success' : 'badge-danger'}">
                                ${cell.status === 'disponible' ? 'Disponible' : 'Ocupado'}
                            </span>
                        </p>
                    </div>
                    <div>
                        <p class="text-muted" style="font-size: 0.75rem;">Piso</p>
                        <p>Piso ${cell.floor}</p>
                    </div>
                    <div>
                        <p class="text-muted" style="font-size: 0.75rem;">Area</p>
                        <p>Area ${cell.area}</p>
                    </div>
                    <div>
                        <p class="text-muted" style="font-size: 0.75rem;">Tipo de Celda</p>
                        <p>
                            <span class="badge ${cell.type === 'carro' ? 'badge-info' : 'badge-warning'}">
                                ${cell.type === 'carro' ? 'Carro' : 'Moto'}
                            </span>
                        </p>
                    </div>
                </div>
                ${vehicleInfo}
            `;

            // Actions based on status and user role
            let actions = '<button type="button" class="btn btn-secondary" onclick="Utils.closeModal(\'cellModal\')">Cerrar</button>';
            
            if (Auth.isAdminOrOperator()) {
                if (cell.status === 'disponible') {
                    actions = `
                        <button type="button" class="btn btn-secondary" onclick="Utils.closeModal('cellModal')">Cerrar</button>
                        <button type="button" class="btn btn-primary" onclick="openAssignModal(${cell.id})">Asignar Vehiculo</button>
                    `;
                } else {
                    actions = `
                        <button type="button" class="btn btn-secondary" onclick="Utils.closeModal('cellModal')">Cerrar</button>
                        <button type="button" class="btn btn-warning" onclick="freeCell(${cell.id})">Liberar Celda</button>
                    `;
                }
            }

            document.getElementById('cellActions').innerHTML = actions;
            Utils.openModal('cellModal');
        }

        // Open assign modal
        function openAssignModal(cellId) {
            Utils.closeModal('cellModal');
            
            const cell = DataStore.getCellById(cellId);
            if (!cell) return;

            document.getElementById('assignCellId').value = cell.id;
            document.getElementById('assignCellCode').value = `${cell.code} (${cell.type === 'carro' ? 'Carro' : 'Moto'})`;

            // Load vehicles not currently parked
            const occupiedVehicleIds = allCells
                .filter(c => c.status === 'ocupado' && c.vehicleId)
                .map(c => c.vehicleId);
            
            const availableVehicles = DataStore.getVehicles()
                .filter(v => !occupiedVehicleIds.includes(v.id) && v.type === cell.type);

            document.getElementById('assignVehicle').innerHTML = 
                '<option value="">Seleccionar vehiculo...</option>' +
                availableVehicles.map(v => `<option value="${v.id}">${v.plate} - ${v.brand} ${v.model}</option>`).join('');

            Utils.openModal('assignModal');
        }

        // Assign vehicle to cell
        function assignVehicleToCell(e) {
            e.preventDefault();
            
            const cellId = document.getElementById('assignCellId').value;
            const vehicleId = document.getElementById('assignVehicle').value;

            DataStore.updateCellStatus(cellId, 'ocupado', parseInt(vehicleId));
            Utils.showAlert('Vehiculo asignado a la celda correctamente', 'success');
            
            Utils.closeModal('assignModal');
            loadCells();
        }

        // Free cell
        function freeCell(cellId) {
            DataStore.updateCellStatus(cellId, 'disponible', null);
            Utils.showAlert('Celda liberada correctamente', 'success');
            
            Utils.closeModal('cellModal');
            loadCells();
        }

        // Initialize
        loadCells();
    </script>
</body>
</html>
