<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios - Parking Lot</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="app-container">
        <div id="sidebar"></div>
        
        <main class="main-content">
            <div class="page-header">
                <div class="page-title">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                        <circle cx="9" cy="7" r="4"/>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                    </svg>
                    <div>
                        <h1>Gestion de Usuarios</h1>
                        <p class="page-subtitle">Administrar usuarios del sistema</p>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="openCreateModal()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"/>
                        <line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                    Nuevo Usuario
                </button>
            </div>

            <div id="alertContainer"></div>

            <!-- Filters -->
            <div class="filters">
                <div class="filter-group">
                    <label>Buscar</label>
                    <input type="text" id="searchInput" placeholder="Nombre o documento..." oninput="filterUsers()">
                </div>
                <div class="filter-group">
                    <label>Tipo de Usuario</label>
                    <select id="filterType" onchange="filterUsers()">
                        <option value="">Todos</option>
                        <option value="administrador">Administrador</option>
                        <option value="operador">Operador</option>
                        <option value="usuario">Usuario</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Estado</label>
                    <select id="filterStatus" onchange="filterUsers()">
                        <option value="">Todos</option>
                        <option value="activo">Activo</option>
                        <option value="inactivo">Inactivo</option>
                    </select>
                </div>
            </div>

            <!-- Users Table -->
            <div class="card">
                <div class="table-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Documento</th>
                                <th>Nombre Completo</th>
                                <th>Email</th>
                                <th>Telefono</th>
                                <th>Tipo</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="usersTable">
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Create/Edit User Modal -->
    <div class="modal-overlay" id="userModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">Nuevo Usuario</h3>
                <button class="modal-close" onclick="closeModal()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <form id="userForm" onsubmit="saveUser(event)">
                <div class="modal-body">
                    <input type="hidden" id="userId">
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Tipo de Documento *</label>
                            <select id="documentType" class="form-control" required>
                                <option value="CC">Cedula de Ciudadania</option>
                                <option value="CE">Cedula de Extranjeria</option>
                                <option value="TI">Tarjeta de Identidad</option>
                                <option value="PA">Pasaporte</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Numero de Documento *</label>
                            <input type="text" id="documentNumber" class="form-control" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Nombre Completo *</label>
                        <input type="text" id="fullName" class="form-control" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Correo Electronico *</label>
                            <input type="email" id="email" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Numero de Celular *</label>
                            <input type="tel" id="phone" class="form-control" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Tipo de Usuario *</label>
                            <select id="userType" class="form-control" required onchange="togglePasswordField()">
                                <option value="usuario">Usuario</option>
                                <option value="operador">Operador</option>
                                <option value="administrador">Administrador</option>
                            </select>
                        </div>
                        <div class="form-group" id="passwordGroup">
                            <label class="form-label">Contrasena</label>
                            <input type="password" id="password" class="form-control">
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- View User Modal -->
    <div class="modal-overlay" id="viewModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">Detalles del Usuario</h3>
                <button class="modal-close" onclick="Utils.closeModal('viewModal')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body" id="viewContent">
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="Utils.closeModal('viewModal')">Cerrar</button>
            </div>
        </div>
    </div>

    <script src="../js/data.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        // Check authentication
        if (!Auth.checkAdminOrOperatorAuth()) {
            window.location.href = 'dashboard.html';
        }

        // Render sidebar
        document.getElementById('sidebar').innerHTML = renderSidebar('users');

        let allUsers = [];

        // Load users
        function loadUsers() {
            allUsers = DataStore.getUsers();
            renderUsers(allUsers);
        }

        // Render users table
        function renderUsers(users) {
            const tbody = document.getElementById('usersTable');
            
            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted">No se encontraron usuarios</td></tr>';
                return;
            }

            tbody.innerHTML = users.map(user => `
                <tr>
                    <td>${user.id}</td>
                    <td>${user.documentType} ${user.documentNumber}</td>
                    <td>${user.fullName}</td>
                    <td>${user.email}</td>
                    <td>${user.phone}</td>
                    <td>
                        <span class="badge ${user.userType === 'administrador' ? 'badge-primary' : user.userType === 'operador' ? 'badge-info' : 'badge-warning'}">
                            ${user.userType.charAt(0).toUpperCase() + user.userType.slice(1)}
                        </span>
                    </td>
                    <td>
                        <span class="badge ${user.status === 'activo' ? 'badge-success' : 'badge-danger'}">
                            ${user.status.charAt(0).toUpperCase() + user.status.slice(1)}
                        </span>
                    </td>
                    <td>
                        <div class="action-buttons">
                            <button class="action-btn view" onclick="viewUser(${user.id})" title="Ver">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                    <circle cx="12" cy="12" r="3"/>
                                </svg>
                            </button>
                            <button class="action-btn edit" onclick="editUser(${user.id})" title="Editar">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                                </svg>
                            </button>
                            ${Auth.isAdmin() ? `
                            <button class="action-btn ${user.status === 'activo' ? 'delete' : 'view'}" onclick="toggleUserStatus(${user.id}, '${user.status}')" title="${user.status === 'activo' ? 'Desactivar' : 'Activar'}">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    ${user.status === 'activo' ? 
                                        '<circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>' :
                                        '<polyline points="20 6 9 17 4 12"/>'}
                                </svg>
                            </button>
                            ` : ''}
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        // Filter users
        function filterUsers() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const type = document.getElementById('filterType').value;
            const status = document.getElementById('filterStatus').value;

            let filtered = allUsers;

            if (search) {
                filtered = filtered.filter(u => 
                    u.fullName.toLowerCase().includes(search) ||
                    u.documentNumber.includes(search)
                );
            }

            if (type) {
                filtered = filtered.filter(u => u.userType === type);
            }

            if (status) {
                filtered = filtered.filter(u => u.status === status);
            }

            renderUsers(filtered);
        }

        // Open create modal
        function openCreateModal() {
            document.getElementById('modalTitle').textContent = 'Nuevo Usuario';
            document.getElementById('userForm').reset();
            document.getElementById('userId').value = '';
            togglePasswordField();
            Utils.openModal('userModal');
        }

        // Close modal
        function closeModal() {
            Utils.closeModal('userModal');
        }

        // Toggle password field based on user type
        function togglePasswordField() {
            const userType = document.getElementById('userType').value;
            const passwordGroup = document.getElementById('passwordGroup');
            const passwordInput = document.getElementById('password');
            
            if (userType === 'usuario') {
                passwordGroup.style.display = 'none';
                passwordInput.removeAttribute('required');
            } else {
                passwordGroup.style.display = 'block';
                if (!document.getElementById('userId').value) {
                    passwordInput.setAttribute('required', 'required');
                }
            }
        }

        // Edit user
        function editUser(id) {
            const user = DataStore.getUserById(id);
            if (!user) return;

            // Only admin can edit others' data
            const session = Auth.getSession();
            if (!Auth.isAdmin() && session.userId !== id) {
                Utils.showAlert('Solo puede editar sus propios datos', 'warning');
                return;
            }

            document.getElementById('modalTitle').textContent = 'Editar Usuario';
            document.getElementById('userId').value = user.id;
            document.getElementById('documentType').value = user.documentType;
            document.getElementById('documentNumber').value = user.documentNumber;
            document.getElementById('fullName').value = user.fullName;
            document.getElementById('email').value = user.email;
            document.getElementById('phone').value = user.phone;
            document.getElementById('userType').value = user.userType;
            document.getElementById('password').value = '';

            togglePasswordField();
            Utils.openModal('userModal');
        }

        // View user
        function viewUser(id) {
            const user = DataStore.getUserById(id);
            if (!user) return;

            const vehicles = DataStore.getVehiclesByOwner(id);

            document.getElementById('viewContent').innerHTML = `
                <div style="display: grid; gap: 1rem;">
                    <div style="display: flex; align-items: center; gap: 1rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border-color);">
                        <div class="user-avatar" style="width: 64px; height: 64px; font-size: 1.5rem;">
                            ${Utils.getInitials(user.fullName)}
                        </div>
                        <div>
                            <h3 style="margin-bottom: 0.25rem;">${user.fullName}</h3>
                            <span class="badge ${user.userType === 'administrador' ? 'badge-primary' : user.userType === 'operador' ? 'badge-info' : 'badge-warning'}">
                                ${user.userType.charAt(0).toUpperCase() + user.userType.slice(1)}
                            </span>
                            <span class="badge ${user.status === 'activo' ? 'badge-success' : 'badge-danger'}" style="margin-left: 0.5rem;">
                                ${user.status.charAt(0).toUpperCase() + user.status.slice(1)}
                            </span>
                        </div>
                    </div>
                    <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem;">
                        <div>
                            <p class="text-muted" style="font-size: 0.75rem; margin-bottom: 0.25rem;">Documento</p>
                            <p>${user.documentType} ${user.documentNumber}</p>
                        </div>
                        <div>
                            <p class="text-muted" style="font-size: 0.75rem; margin-bottom: 0.25rem;">Codigo</p>
                            <p>${user.id}</p>
                        </div>
                        <div>
                            <p class="text-muted" style="font-size: 0.75rem; margin-bottom: 0.25rem;">Email</p>
                            <p>${user.email}</p>
                        </div>
                        <div>
                            <p class="text-muted" style="font-size: 0.75rem; margin-bottom: 0.25rem;">Telefono</p>
                            <p>${user.phone}</p>
                        </div>
                        <div>
                            <p class="text-muted" style="font-size: 0.75rem; margin-bottom: 0.25rem;">Fecha de Registro</p>
                            <p>${Utils.formatDate(user.createdAt)}</p>
                        </div>
                        <div>
                            <p class="text-muted" style="font-size: 0.75rem; margin-bottom: 0.25rem;">Vehiculos Asignados</p>
                            <p>${vehicles.length > 0 ? vehicles.map(v => v.plate).join(', ') : 'Ninguno'}</p>
                        </div>
                    </div>
                </div>
            `;
            
            Utils.openModal('viewModal');
        }

        // Save user
        function saveUser(e) {
            e.preventDefault();
            
            const userId = document.getElementById('userId').value;
            const userData = {
                documentType: document.getElementById('documentType').value,
                documentNumber: document.getElementById('documentNumber').value,
                fullName: document.getElementById('fullName').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                userType: document.getElementById('userType').value
            };

            const password = document.getElementById('password').value;
            if (password && userData.userType !== 'usuario') {
                userData.password = password;
            }

            if (userId) {
                // Update
                DataStore.updateUser(userId, userData);
                
                // If user updated their own data, notify admin
                const session = Auth.getSession();
                if (session.userId === parseInt(userId) && !Auth.isAdmin()) {
                    DataStore.createNotification(`El usuario ${userData.fullName} ha actualizado sus datos personales`, 'info');
                }
                
                Utils.showAlert('Usuario actualizado correctamente', 'success');
            } else {
                // Create
                // Check if document already exists
                if (DataStore.getUserByDocument(userData.documentNumber)) {
                    Utils.showAlert('Ya existe un usuario con este numero de documento', 'danger');
                    return;
                }
                
                DataStore.createUser(userData);
                Utils.showAlert('Usuario creado correctamente', 'success');
            }

            closeModal();
            loadUsers();
        }

        // Toggle user status (admin only)
        function toggleUserStatus(id, currentStatus) {
            if (!Auth.isAdmin()) {
                Utils.showAlert('Solo el administrador puede cambiar el estado de usuarios', 'warning');
                return;
            }

            const newStatus = currentStatus === 'activo' ? 'inactivo' : 'activo';
            DataStore.updateUserStatus(id, newStatus);
            Utils.showAlert(`Usuario ${newStatus === 'activo' ? 'activado' : 'desactivado'} correctamente`, 'success');
            loadUsers();
        }

        // Initialize
        loadUsers();
    </script>
</body>
</html>
