<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehiculos - Parking Lot</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="app-container">
        <div id="sidebar"></div>
        
        <main class="main-content">
            <div class="page-header">
                <div class="page-title">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 16H9m10 0h3v-3.15a1 1 0 0 0-.84-.99L16 11l-2.7-3.6a1 1 0 0 0-.8-.4H5.24a2 2 0 0 0-1.8 1.1l-.8 1.63A6 6 0 0 0 2 12.42V16h2"/>
                        <circle cx="6.5" cy="16.5" r="2.5"/>
                        <circle cx="16.5" cy="16.5" r="2.5"/>
                    </svg>
                    <div>
                        <h1>Gestion de Vehiculos</h1>
                        <p class="page-subtitle">Administrar vehiculos registrados</p>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="openCreateModal()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"/>
                        <line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                    Nuevo Vehiculo
                </button>
            </div>

            <div id="alertContainer"></div>

            <!-- Filters -->
            <div class="filters">
                <div class="filter-group">
                    <label>Buscar por Placa</label>
                    <input type="text" id="searchInput" placeholder="Ej: ABC123" oninput="filterVehicles()">
                </div>
                <div class="filter-group">
                    <label>Tipo</label>
                    <select id="filterType" onchange="filterVehicles()">
                        <option value="">Todos</option>
                        <option value="carro">Carro</option>
                        <option value="moto">Moto</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Marca</label>
                    <input type="text" id="filterBrand" placeholder="Marca..." oninput="filterVehicles()">
                </div>
            </div>

            <!-- Vehicles Table -->
            <div class="card">
                <div class="table-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Placa</th>
                                <th>Tipo</th>
                                <th>Marca</th>
                                <th>Modelo</th>
                                <th>Color</th>
                                <th>Propietario</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="vehiclesTable">
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Create/Edit Vehicle Modal -->
    <div class="modal-overlay" id="vehicleModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">Nuevo Vehiculo</h3>
                <button class="modal-close" onclick="closeModal()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <form id="vehicleForm" onsubmit="saveVehicle(event)">
                <div class="modal-body">
                    <input type="hidden" id="vehicleId">
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Placa *</label>
                            <input type="text" id="plate" class="form-control" placeholder="Ej: ABC123" required style="text-transform: uppercase;">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Tipo *</label>
                            <select id="vehicleType" class="form-control" required>
                                <option value="carro">Carro</option>
                                <option value="moto">Moto</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Marca *</label>
                            <input type="text" id="brand" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Modelo *</label>
                            <input type="text" id="model" class="form-control" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Color *</label>
                            <input type="text" id="color" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Propietario</label>
                            <select id="ownerId" class="form-control">
                                <option value="">Sin asignar</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Assign Owner Modal -->
    <div class="modal-overlay" id="assignModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">Asignar Propietario</h3>
                <button class="modal-close" onclick="Utils.closeModal('assignModal')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <form id="assignForm" onsubmit="assignOwner(event)">
                <div class="modal-body">
                    <input type="hidden" id="assignVehicleId">
                    
                    <div class="form-group">
                        <label class="form-label">Vehiculo</label>
                        <input type="text" id="assignVehiclePlate" class="form-control" readonly>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Nuevo Propietario *</label>
                        <select id="newOwnerId" class="form-control" required>
                            <option value="">Seleccionar usuario...</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="Utils.closeModal('assignModal')">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Asignar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/data.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        // Check authentication
        if (!Auth.checkAdminOrOperatorAuth()) {
            window.location.href = 'dashboard.html';
        }

        // Render sidebar
        document.getElementById('sidebar').innerHTML = renderSidebar('vehicles');

        let allVehicles = [];

        // Load vehicles
        function loadVehicles() {
            allVehicles = DataStore.getVehicles();
            renderVehicles(allVehicles);
            loadOwnerOptions();
        }

        // Load owner options for select
        function loadOwnerOptions() {
            const users = DataStore.getUsers().filter(u => u.status === 'activo');
            const ownerSelect = document.getElementById('ownerId');
            const newOwnerSelect = document.getElementById('newOwnerId');
            
            const options = users.map(u => `<option value="${u.id}">${u.fullName} (${u.documentNumber})</option>`).join('');
            
            ownerSelect.innerHTML = '<option value="">Sin asignar</option>' + options;
            newOwnerSelect.innerHTML = '<option value="">Seleccionar usuario...</option>' + options;
        }

        // Render vehicles table
        function renderVehicles(vehicles) {
            const tbody = document.getElementById('vehiclesTable');
            
            if (vehicles.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted">No se encontraron vehiculos</td></tr>';
                return;
            }

            tbody.innerHTML = vehicles.map(vehicle => {
                const owner = vehicle.ownerId ? DataStore.getUserById(vehicle.ownerId) : null;
                return `
                <tr>
                    <td>${vehicle.id}</td>
                    <td><span class="badge badge-primary">${vehicle.plate}</span></td>
                    <td>
                        <span class="badge ${vehicle.type === 'carro' ? 'badge-info' : 'badge-warning'}">
                            ${vehicle.type.charAt(0).toUpperCase() + vehicle.type.slice(1)}
                        </span>
                    </td>
                    <td>${vehicle.brand}</td>
                    <td>${vehicle.model}</td>
                    <td>${vehicle.color}</td>
                    <td>${owner ? owner.fullName : '<span class="text-muted">Sin asignar</span>'}</td>
                    <td>
                        <div class="action-buttons">
                            ${Auth.isAdmin() ? `
                            <button class="action-btn edit" onclick="editVehicle(${vehicle.id})" title="Editar">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                                </svg>
                            </button>
                            <button class="action-btn view" onclick="openAssignModal(${vehicle.id})" title="Asignar propietario">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                                    <circle cx="8.5" cy="7" r="4"/>
                                    <line x1="20" y1="8" x2="20" y2="14"/>
                                    <line x1="23" y1="11" x2="17" y2="11"/>
                                </svg>
                            </button>
                            ` : `
                            <button class="action-btn view" onclick="openAssignModal(${vehicle.id})" title="Asignar propietario">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                                    <circle cx="8.5" cy="7" r="4"/>
                                    <line x1="20" y1="8" x2="20" y2="14"/>
                                    <line x1="23" y1="11" x2="17" y2="11"/>
                                </svg>
                            </button>
                            `}
                        </div>
                    </td>
                </tr>
            `}).join('');
        }

        // Filter vehicles
        function filterVehicles() {
            const search = document.getElementById('searchInput').value.toUpperCase();
            const type = document.getElementById('filterType').value;
            const brand = document.getElementById('filterBrand').value.toLowerCase();

            let filtered = allVehicles;

            if (search) {
                filtered = filtered.filter(v => v.plate.toUpperCase().includes(search));
            }

            if (type) {
                filtered = filtered.filter(v => v.type === type);
            }

            if (brand) {
                filtered = filtered.filter(v => v.brand.toLowerCase().includes(brand));
            }

            renderVehicles(filtered);
        }

        // Open create modal
        function openCreateModal() {
            document.getElementById('modalTitle').textContent = 'Nuevo Vehiculo';
            document.getElementById('vehicleForm').reset();
            document.getElementById('vehicleId').value = '';
            Utils.openModal('vehicleModal');
        }

        // Close modal
        function closeModal() {
            Utils.closeModal('vehicleModal');
        }

        // Edit vehicle (admin only)
        function editVehicle(id) {
            if (!Auth.isAdmin()) {
                Utils.showAlert('Solo el administrador puede editar vehiculos', 'warning');
                return;
            }

            const vehicle = DataStore.getVehicleById(id);
            if (!vehicle) return;

            document.getElementById('modalTitle').textContent = 'Editar Vehiculo';
            document.getElementById('vehicleId').value = vehicle.id;
            document.getElementById('plate').value = vehicle.plate;
            document.getElementById('vehicleType').value = vehicle.type;
            document.getElementById('brand').value = vehicle.brand;
            document.getElementById('model').value = vehicle.model;
            document.getElementById('color').value = vehicle.color;
            document.getElementById('ownerId').value = vehicle.ownerId || '';

            Utils.openModal('vehicleModal');
        }

        // Save vehicle
        function saveVehicle(e) {
            e.preventDefault();
            
            const vehicleId = document.getElementById('vehicleId').value;
            const vehicleData = {
                plate: document.getElementById('plate').value.toUpperCase(),
                type: document.getElementById('vehicleType').value,
                brand: document.getElementById('brand').value,
                model: document.getElementById('model').value,
                color: document.getElementById('color').value,
                ownerId: document.getElementById('ownerId').value ? parseInt(document.getElementById('ownerId').value) : null
            };

            if (vehicleId) {
                // Update (admin only)
                if (!Auth.isAdmin()) {
                    Utils.showAlert('Solo el administrador puede editar vehiculos', 'warning');
                    return;
                }
                DataStore.updateVehicle(vehicleId, vehicleData);
                Utils.showAlert('Vehiculo actualizado correctamente', 'success');
            } else {
                // Create
                // Check if plate already exists
                if (DataStore.getVehicleByPlate(vehicleData.plate)) {
                    Utils.showAlert('Ya existe un vehiculo con esta placa', 'danger');
                    return;
                }
                
                DataStore.createVehicle(vehicleData);
                Utils.showAlert('Vehiculo creado correctamente', 'success');
            }

            closeModal();
            loadVehicles();
        }

        // Open assign modal
        function openAssignModal(vehicleId) {
            const vehicle = DataStore.getVehicleById(vehicleId);
            if (!vehicle) return;

            document.getElementById('assignVehicleId').value = vehicle.id;
            document.getElementById('assignVehiclePlate').value = `${vehicle.plate} - ${vehicle.brand} ${vehicle.model}`;
            document.getElementById('newOwnerId').value = vehicle.ownerId || '';

            Utils.openModal('assignModal');
        }

        // Assign owner
        function assignOwner(e) {
            e.preventDefault();

            // Only admin can reassign to different user
            const vehicleId = document.getElementById('assignVehicleId').value;
            const newOwnerId = document.getElementById('newOwnerId').value;

            if (!Auth.isAdmin() && !Auth.isOperator()) {
                Utils.showAlert('No tiene permisos para asignar vehiculos', 'warning');
                return;
            }

            DataStore.assignVehicleToUser(vehicleId, newOwnerId ? parseInt(newOwnerId) : null);
            Utils.showAlert('Propietario asignado correctamente', 'success');
            
            Utils.closeModal('assignModal');
            loadVehicles();
        }

        // Initialize
        loadVehicles();
    </script>
</body>
</html>
